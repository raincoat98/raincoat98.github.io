<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#180830"/>
    </linearGradient>
    <radialGradient id="glow" cx="300" cy="300" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B2FFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="white" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow behind umbrella -->
  <circle cx="300" cy="300" r="240" fill="url(#glow)"/>

  <!-- Umbrella canopy -->
  <path d="M100 315 C100 120 500 120 500 315 Z" fill="#7B2FFF"/>

  <!-- Canopy ribs -->
  <line x1="300" y1="315" x2="163" y2="205" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="300" y1="315" x2="300" y2="169" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="300" y1="315" x2="438" y2="205" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Tip -->
  <circle cx="300" cy="166" r="6" fill="white"/>

  <!-- Handle -->
  <line x1="300" y1="315" x2="300" y2="455" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Hook -->
  <path d="M300 455 Q300 492 262 492 Q232 492 232 460" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="white" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Name Korean -->
  <text x="660" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif" font-weight="700" font-size="78" fill="white">우상욱</text>

  <!-- Name English -->
  <text x="665" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="28" fill="white" fill-opacity="0.5">WooSangWook</text>

  <!-- Accent bar -->
  <rect x="660" y="320" width="65" height="4" rx="2" fill="#7B2FFF"/>

  <!-- Role English -->
  <text x="660" y="390" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="36" fill="white">Frontend Developer</text>

  <!-- Role Korean -->
  <text x="662" y="436" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif" font-size="24" fill="white" fill-opacity="0.6">프론트엔드 개발자</text>

  <!-- URL -->
  <text x="660" y="538" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#7B2FFF">raincoat98.github.io</text>
</svg>
